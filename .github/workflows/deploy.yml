name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Build wykonuje się na serwerze (ma DATABASE_URL i env produkcyjne),
      # dlatego nie budujemy na runnerze GitHuba — tu tylko wyzwalamy deploy po SSH.
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: "20m"
          script: |
            cd /home/adrian/kscsystem
            git pull origin main
            npm ci
            npx prisma generate --schema=packages/db/prisma/schema.prisma
            npx prisma db push --schema=packages/db/prisma/schema.prisma --skip-generate
            npm run db:seed-audit -w @kscsystem/db || true
            npm run build -w apps/web
            npm run build -w apps/landing
            npm run build -w apps/admin
            pm2 restart kscsystem-web kscsystem-landing
            pm2 restart kscsystem-admin 2>/dev/null || (cd /home/adrian/kscsystem/apps/admin && pm2 start npm --name kscsystem-admin -- start)
            pm2 save
            sudo -n true 2>/dev/null && bash scripts/fix-admin-nginx.sh || echo "nginx /admin: pomijam (brak passwordless sudo) — uruchom recznie: bash scripts/fix-admin-nginx.sh"
